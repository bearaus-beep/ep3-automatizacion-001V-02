devices:
  CSR1kv:
    os: iosxe
    type: router
    credentials:
      default:
        username: cisco
        password: cisco123!
    connections:
      cli:
        protocol: ssh
        ip: 192.168.56.105
        port: 22
        arguments:
          ssh_options: "-o KexAlgorithms=diffie-hellman-group14-sha1 -o StrictHostKeyChecking=no -o HostKeyAlgorithms=+ssh-rsa"
        settings:
          PROMPT: "RTR-INMOCEN[>#]"
